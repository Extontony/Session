<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair Code</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 300px;
      padding: 20px;
      text-align: center;
      background-color: rgb(15, 15, 15);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(250, 249, 249, 0.2);
    }

    #text {
      color: #f6f5f5;
    }

    .centered-text {
      color: #e9e4e4;
      text-align: center;
    }

    .input-container {
      display: flex;
      background: rgb(10, 10, 10);
      border-radius: 1rem;
      padding: 0.3rem;
      gap: 0.3rem;
      max-width: 300px;
      width: 100%;
      margin: 0 auto;
    }

    .input-container input {
      border-radius: 0.8rem 0 0 0.8rem;
      background: #e8e8e8;
      width: 100%;
      flex-basis: 75%;
      padding: 1rem;
      border: none;
      color: #000000;
      transition: all 0.2s ease-in-out;
    }

    .input-container input:focus {
      outline: none;
      background: #ffffff;
    }

    .input-container button {
      flex-basis: 25%;
      padding: 1rem;
      background: #5935ac;
      font-weight: 700;
      letter-spacing: 0.1rem;
      text-transform: uppercase;
      color: white;
      border: none;
      border-radius: 0 1rem 1rem 0;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }

    .input-container button:hover:not(:disabled) {
      background: linear-gradient(135deg, #c01736 0%, #8b17b6 100%);
    }

    .input-container button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 500px) {
      .input-container {
        flex-direction: column;
      }
      .input-container input, .input-container button {
        border-radius: 0.8rem;
        width: 100%;
      }
      .input-container button {
        padding: 0.8rem;
      }
      .box {
        width: 90%; 
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box" id="box">
      <div id="text">
        <i class="fa fa-user fa-2x"></i>
        <h3 class="centered-text">DEVTRIX PAIRING CODE</h3>
        <h6>Made By DEVTRIX.</h6>
        <h6>Enter Your Number with Country Code.</h6>
        
        <div class="input-container">
          <input type="tel" id="number" placeholder="e.g. 263781206xxx" inputmode="numeric">
          <button id="submit">Submit</button>
        </div>
        
        <br>
        <main id="pair"></main>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let pairContainer = document.getElementById("pair");
    let submitBtn = document.getElementById("submit");
    let numberInput = document.getElementById("number");

    async function Copy() {
      let obj = document.getElementById("copy");
      let text = obj.innerText;
      let codeToCopy = text.replace('CODE: ', '');
      
      try {
        await navigator.clipboard.writeText(codeToCopy);
        obj.innerText = "COPIED!";
        obj.style.color = "#00ff88"; // Green for success
        
        setTimeout(() => {
          obj.innerText = text;
          obj.style.color = "red";
        }, 1500);
      } catch (err) {
        console.error('Failed to copy text: ', err);
        alert('Failed to copy. Please copy manually: ' + codeToCopy);
      }
    }

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      
      if (!numberInput.value) {
        pairContainer.innerHTML = '<span style="color:white;font-weight:bold">Enter your WhatsApp number with Country Code</span><br><br>';
        return;
      } 
      
      const cleanNumber = numberInput.value.replace(/[^0-9]/g, "");
      
      if (cleanNumber.length < 10) {
        pairContainer.innerHTML = '<span style="color:red;font-weight:bold">Invalid Number (min 10 digits)</span><br><br>';
        return;
      }

      // Disable button during request
      submitBtn.disabled = true;

      // Format input visually for the user
      numberInput.type = "text";
      numberInput.value = "+" + cleanNumber;
      numberInput.style.color = "black";
      numberInput.style.fontSize = "16px";
      
      pairContainer.innerHTML = '<span style="color:#38bdf8;font-weight:bold">Generating Code... Please Wait</span><br><br>';
      
      try {
        let response = await axios.get(`/code?number=${cleanNumber}`, {
          timeout: 60000 // 60 second timeout
        });
        
        let code = response.data.code || response.data || "Service Unavailable";
        
        pairContainer.innerHTML = `
          <div id="copy" onclick="Copy()" style="color:red;font-weight:bold;font-size:24px;cursor:pointer;padding:10px;border-radius:5px;background:rgba(255,0,0,0.1);">
            CODE: <span style="color:white;">${code}</span>
          </div>
          <p style="font-size:12px;color:gray;">Click to copy the code</p>
        `;
      } catch (error) {
        console.error('Error:', error);
        
        let errorMsg = 'Error fetching code. ';
        
        if (error.code === 'ECONNABORTED') {
          errorMsg += 'Request timeout - server might be slow.';
        } else if (error.response) {
          errorMsg += `Server error: ${error.response.status}`;
        } else if (error.request) {
          errorMsg += 'No response from server. Is it running?';
        } else {
          errorMsg += 'Network error.';
        }
        
        pairContainer.innerHTML = `<span style="color:red;font-weight:bold">${errorMsg}</span><br><br>`;
      } finally {
        // Re-enable button
        submitBtn.disabled = false;
      }
    });

    // Allow Enter key to submit
    numberInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        submitBtn.click();
      }
    });
  </script>
</body>
</html>
