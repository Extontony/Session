<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DEVTRIX TECH BOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a; /* Modern slate dark */
      --card-bg: rgba(30, 41, 59, 0.7);
      --accent: #38bdf8; /* Modern light blue */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(167, 139, 250, 0.15) 0px, transparent 50%);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(to right, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    /* Emphasize the two main generator buttons */
    .btn-primary {
      grid-column: span 2;
      background: linear-gradient(135deg, #38bdf8, #4f46e5) !important;
      color: white !important;
      border: none !important;
      font-weight: 600 !important;
      font-size: 16px !important;
    }

    .btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Mobile Responsiveness */
    @media (max-width: 400px) {
      .button-grid {
        grid-template-columns: 1fr;
      }
      .btn-primary {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>DEVTRIX TECH</h1>
      <p>Created by Devtrix</p>
    </div>

    <div class="button-grid">
      <button onclick="window.open(`/wasiqr`)" class="btn btn-primary">QR Code</button>
      <button onclick="window.open(`pair.html`)" class="btn btn-primary">Pair Code</button>
      
      <button onclick="window.open(`https://github.com/extontony/devtrix`)" class="btn">Bot Repo</button>
      <button onclick="window.open(`https://github.com/wasixd/WASI-MD-PLUGINS`)" class="btn">Plugins</button>
      <button onclick="window.open(`https://wa.me/263781206152`)" class="btn">Contact Me</button>
      <button onclick="window.open(`https://chat.whatsapp.com/L14FfkAgFCN9eXGe5Sqjqt`)" class="btn">WA Group</button>
      <button onclick="window.open(`https://whatsapp.com/channel/0029VaDK8ZUDjiOhwFS1cP2j`)" class="btn">WA Channel</button>
      <button onclick="window.open(`https://instagram.com/itx_mee_wasi`)" class="btn">Instagram</button>
      <button onclick="window.open(`https://youtube.com`)" class="btn">YouTube</button>
    </div>
  </div>

</body>
</html>
